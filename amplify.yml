version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix ai-learning-platform
    build:
      commands:
        - npm run build --prefix ai-learning-platform

  artifacts:
    baseDirectory: ai-learning-platform/build
    files:
      - '**/*'

  cache:
    paths:
      - ai-learning-platform/node_modules/**/*